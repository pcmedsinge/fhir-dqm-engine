name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint / Test / Build / Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: Docker build (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pramana:ci
