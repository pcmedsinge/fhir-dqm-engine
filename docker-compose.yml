# =============================================================
# Pramana — local dev stack
#
# Services:
#   engine         — NestJS app (optional; usually run on host via `pnpm start:dev`)
#   hapi-fhir      — HAPI FHIR R4 server, port 8080
#   hapi-postgres  — Postgres 16, HAPI's persistence (internal network only)
#
# Quick start (Phase 2):
#   docker compose up -d hapi-postgres hapi-fhir
#   curl http://localhost:8080/fhir/metadata
#   pnpm run seed:fhir
#   pnpm --filter @pramana/engine start:dev   # in a second terminal
# =============================================================

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug
      # When the engine runs in this compose network, reach HAPI via service name.
      # When running on the host (default dev flow), the engine reads FHIR_SERVER_URL
      # from .env and points at http://localhost:8080/fhir instead.
      FHIR_SERVER_URL: http://hapi-fhir:8080/fhir
    depends_on:
      hapi-fhir:
        condition: service_healthy
    networks:
      - pramana
    profiles:
      - containerized-engine

  hapi-postgres:
    image: postgres:16-alpine
    # Dev-only credentials. Production MUST override (env file, secrets, or external DB).
    environment:
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
      POSTGRES_DB: hapi
    volumes:
      - hapi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hapi -d hapi']
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - pramana

  hapi-fhir:
    image: hapiproject/hapi:v8.8.0-1
    depends_on:
      hapi-postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      # Spring datasource — point HAPI at the sibling Postgres service
      spring.datasource.url: jdbc:postgresql://hapi-postgres:5432/hapi
      spring.datasource.username: hapi
      spring.datasource.password: hapi
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      # HAPI FHIR config
      hapi.fhir.fhir_version: R4
      hapi.fhir.subscription.resthook_enabled: 'false'
      hapi.fhir.subscription.websocket_enabled: 'false'
      hapi.fhir.allow_external_references: 'true'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://localhost:8080/fhir/metadata || exit 1
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s
    networks:
      - pramana

volumes:
  hapi-postgres-data:

networks:
  pramana:
    driver: bridge
